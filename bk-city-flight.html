<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endless City Flight - Three.js (Studio)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e8ecf1;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    #canvas-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #333;
      pointer-events: none;
      z-index: 10;
    }
    .overlay-content h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.2em;
      margin: 0;
      font-weight: 300;
      text-shadow: 0 4px 10px rgba(255,255,255,0.8);
      user-select: none;
    }
    .overlay-content p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      letter-spacing: 0.1em;
      margin-top: 10px;
      color: #666;
      user-select: none;
    }

    .overlay-cityscape {
      transition: opacity 1.1s ease-out;
    }
    .overlay-cityscape.overlay-cityscape--hidden {
      opacity: 0;
      pointer-events: none;
    }

    #opening-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #000000;
      cursor: pointer;
      transition: opacity 0.05s linear;
    }
    #opening-overlay[aria-hidden="true"] {
      pointer-events: none;
    }
    .opening-typewriter-line {
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      min-height: 1.4em;
      user-select: none;
    }
    .opening-cursor {
      display: inline-block;
      width: 0.55ch;
      margin-left: 1px;
      border-right: 2px solid currentColor;
      /* 要素内にテキストが無いので、border の高さが確保されないことがある */
      height: 1.1em;
      vertical-align: -0.1em;
      opacity: 1;
      animation: none;
    }
    @keyframes opening-blink {
      50% { opacity: 0; }
    }
    .opening-cursor--blinking {
      animation: opening-blink 0.9s step-end infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .opening-cursor--blinking {
        animation: none;
        opacity: 0.85;
      }
    }
    .opening-skip-hint {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #888;
      text-transform: uppercase;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="opening-overlay" role="dialog" aria-label="Opening" aria-modal="true">
    <div class="opening-typewriter-line" id="opening-typewriter-line">
      <span id="opening-typewriter-text"></span><span class="opening-cursor" aria-hidden="true"></span>
    </div>
  </div>

  <!-- <div class="overlay-content overlay-cityscape" aria-hidden="true">
    <h1>CITYSCAPE</h1>
    <p>Endless Flight</p>
  </div> -->

  <!-- UMD版: STUDIO埋め込み環境でも読み込みが通りやすい -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>

    // ---------------------------
    // Config (Studio埋め込み想定)
    // ---------------------------
    const CONFIG = {
      // ループ周期（ユーザー指定のため変更しないこと）
      loopDurationMs: 80000,

      // カメラ（軌道のなめらかさ）
      camera: {
        // u をバネで追従（加速度が滑らか。0 で下の指数平滑にフォールバック）
        pathSpringStiffness: 58,
        pathSpringDamping: 15,
        // pathSpringStiffness が 0 のとき: ループパラメータの指数平滑（カメラと街トレッド同期）
        loopParamSmoothing: 16,
        // 接線の数値微分に使う幅（小さいとカクつきやすい）
        tangentEpsilon: 0.004,
      },

      // ファサード手続きテクスチャ（横帯低ポリ寄せ）
      facade: {
        seed: 20260320,
        // instanceColor と乗算しやすいニュートラル
        materialBaseColor: 0xefefef,
        bandCountMin: 10,
        bandCountMax: 18,
        columnCountMin: 3,
        columnCountMax: 5,
        stripeCount: 6,
        repeatU: 2,
        repeatV: 5,
        noiseMulMin: 0.96,
        noiseMulMax: 1.05,
      },

      // 屋上小物（InstancedMesh、観覧車なし）— 数を抑えて負荷軽減
      rooftop: {
        minBuildingHeight: 14,
        spawnChance: 0.16,
        instanceCapFactor: 0.18,
        hvacWeight: 0.45,
        helipadWeight: 0.32,
        tankWeight: 0.23,
      },

      // 背景・霧（昼向け・破綻しにくい濃度）
      bgColor: 0xe8ecf1,
      // 街の中を通る演出に寄せて、遠景が消えすぎない範囲へ
      // 霧の勾配をやや長くして、距離バンドの切り替わり感（チラつきに見える）を弱める
      fogNear: 280,
      fogFar: 2400,

      // 都市スケール
      city: {
        buildingBaseColor: 0xdfe6ef,
        roadColor: 0xc7ced6,

        // チャンク（区画）
        chunkWidth: 1600,
        chunkDepth: 800,
        numChunks: 4,

        // 1ブロックのサイズ（道路との関係）
        blockSize: 60,
        roadWidth: 14,
      },

      // 照明/質感（写真っぽさ寄せ）
      lighting: {
        hemiSky: 0xffffff,
        hemiGround: 0xb0b5b9,
        // シャドウON時はフィルを少し下げ、太陽光のコントラストを出す
        // ビルが受影しない分、環境光を少し足して階調を平らに（ギザ感軽減）
        hemiIntensity: 0.7,

        dirColor: 0xfff8f0,
        dirIntensity: 1.12,
        dirPos: { x: 320, y: 520, z: 190 },
      },

      // マウス追従（軽め）
      mouseParallax: {
        // ユーザー要望により無効化（ループアニメーションのみ）
        enabled: false,
        positionStrength: { x: 120, y: 75 },
        lookStrength: 0.18,
        smoothing: 0.03,
      },

      // 品質段階（速度/安定性ガード）
      quality: {
        // 高DPRはサブピクセルで縞・モアレが出やすい → 1.25 で安定寄り
        maxDpr: 1.25,
        // 滑らかさ最優先：シャドウは出すと一瞬重くなるので OFF
        enableShadows: false,
        // ビル影のコストが重いので、まずは解像度を控えめに
        shadowMapSize: 2048,
        // 立面がシャドウマップを受けるとアクネ/泳ぎでチカチカしやすい → 地面のみ受影
        buildingReceiveShadow: false,
        // PCFSoft より軽いフィルタ（その分影はやや硬め）
        shadowFilter: "pcf",
        // PCFSoft 用（pcf では使われない）
        shadowRadius: 1.85,
        // シャドウ更新間隔（3なら約20fps相当で更新）
        shadowUpdateEveryFrames: 3,
        enableBloom: false,    // このPlanではOFF前提（必要なら段階拡張）
      },

      // シャドウマップの代わりに使う軽量“ブロブ影”（床に薄い楕円を敷く）
      // InstancedMesh なのでシャドウマップより軽く、動きも自然。
      shadowBlobs: {
        enabled: true,
        seed: 1337,
        // 各ビル（厳密には各セルの最下段）に対して出す確率
        spawnChance: 0.35,
        // ビル総数に対して上限（薄く見えるので少なめでもOK）
        instanceCapFactor: 0.25,
        // 影の濃さ（透明度）
        opacity: 0.22,
        // 床（y=0）からの浮き（Z-fighting回避）
        yOffset: 0.012,
        // 影のスケール倍率（見た目調整）
        blobScale: 1.0,
        // ブロブのテクスチャ解像度
        textureSize: 128,
      },

      // InstancedMeshの設計制約
      building: {
        // roughness/metalnessは写真っぽさを壊しにくい範囲で固定
        roughness: 0.78,
        metalness: 0.05,
        // 広がりやすい帯状の不自然さを抑えるため係数を控えめに
        maxTierMultiplier: 4,
      },

      // ランディング・オープニング（白画面→タイプライト→霧が晴れる→本編）
      opening: {
        enabled: true,
        // タイプ前にカーソルだけ点滅（CSS .opening-cursor の周期と揃える）
        preTypeCursorBlinkCount: 3,
        cursorBlinkCycleMs: 900,
        typewriterText: "建築とデータをつなぎ、空間の価値を最大化する",
        charDelayMs: 95,
        // 「つなぎ」と「空間の」の間に少し間を入れる（空間の開始直前に適用）
        typewriterPhraseGapBeforeText: "空間の",
        typewriterPhraseGapDelayMs: 600,
        pauseAfterTypeMs: 700,
        revealDurationMs: 3200,
        openingFogNear: 42,
        openingFogFar: 320,
        // ArcAid開始後から本編（ビル/カメラ）の始動までの遅延
        mainTimelineStartDelayMs: 600,
        allowSkip: true,
        showSkipHint: true,
      },
    };

    // ---------------------------
    // Utils
    // ---------------------------
    function mulberry32(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function clamp(x, a, b) {
      return Math.max(a, Math.min(b, x));
    }

    // vertexColors:true のとき、ジオメトリに color が無いと暗黒(0)扱いで真っ黒になるため必須
    function attachWhiteVertexColors(geometry) {
      const n = geometry.attributes.position.count;
      const c = new Float32Array(n * 3);
      for (let i = 0; i < c.length; i++) c[i] = 1;
      geometry.setAttribute("color", new THREE.BufferAttribute(c, 3));
    }

    // 軽量“ブロブ影”用：放射状グラデーション（中心ほど濃く、外ほど透明）
    function createShadowBlobTexture(seed, size) {
      const s = size || 128;
      const canvas = document.createElement("canvas");
      canvas.width = s;
      canvas.height = s;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Canvas 2D context not available for shadow blob.");

      // seed は微調整用（毎回同じ絵になるよう確定）
      const rng = mulberry32(seed >>> 0);
      const jitter = 0.08 + rng() * 0.06;

      const cx = s * (0.5 + (rng() - 0.5) * jitter * 0.3);
      const cy = s * (0.5 + (rng() - 0.5) * jitter * 0.3);
      const r = s * (0.46 + rng() * 0.08);

      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      // 黒：MeshBasic + opacity で最終濃度を調整
      grad.addColorStop(0, "rgba(0,0,0,1)");
      grad.addColorStop(1, "rgba(0,0,0,0)");

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, s, s);

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.ClampToEdgeWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
      tex.needsUpdate = true;
      return tex;
    }

    // 建物ファサード（アルベド/ラフネス）— 横帯メイン・窓なし
    function createBuildingFacadeMaps(seed) {
      const size = 256;
      const canvasAlbedo = document.createElement("canvas");
      canvasAlbedo.width = size;
      canvasAlbedo.height = size;
      const ctxA = canvasAlbedo.getContext("2d");
      if (!ctxA) throw new Error("Canvas 2D context not available for facade.");

      const canvasRough = document.createElement("canvas");
      canvasRough.width = size;
      canvasRough.height = size;
      const ctxR = canvasRough.getContext("2d");
      if (!ctxR) throw new Error("Canvas 2D context not available for roughness.");

      const rng = mulberry32(seed);
      const fc = CONFIG.facade;

      // ベース（明るめニュートラル・instanceColor と乗算しやすい）
      const base = new THREE.Color(CONFIG.city.buildingBaseColor);
      ctxA.fillStyle = `rgb(${base.r * 255},${base.g * 255},${base.b * 255})`;
      ctxA.fillRect(0, 0, size, size);

      ctxR.fillStyle = "rgb(185,185,185)";
      ctxR.fillRect(0, 0, size, size);

      // 縦リズム（弱め）
      const colMin = fc.columnCountMin;
      const colMax = fc.columnCountMax;
      const columnCount = Math.floor(colMin + rng() * (colMax - colMin + 0.999));
      for (let i = 0; i < columnCount; i++) {
        const baseX = (i / columnCount) * size;
        const x0 = baseX + (rng() - 0.5) * 3;
        const w = 0.8 + rng() * (size / columnCount) * 0.28;
        const coreA = 0.025 + rng() * 0.05;
        ctxA.fillStyle = `rgba(0,0,0,${coreA})`;
        ctxA.fillRect(Math.max(0, x0), 0, Math.max(0.5, w), size);
        const edgeA = 0.01 + rng() * 0.025;
        ctxA.fillStyle = `rgba(255,255,255,${edgeA})`;
        ctxA.fillRect(Math.max(0, x0 + w * 0.2), 0, Math.max(0.5, w * 0.1), size);
        const colR = 0.02 + rng() * 0.05;
        ctxR.fillStyle = `rgba(255,255,255,${colR})`;
        ctxR.fillRect(Math.max(0, x0), 0, Math.max(0.5, w), size);
      }

      // 横帯メイン（フロア／ストライプ）
      const bandN = Math.floor(fc.bandCountMin + rng() * (fc.bandCountMax - fc.bandCountMin + 0.999));
      for (let j = 0; j < bandN; j++) {
        const y0 = (j / bandN) * size + (rng() - 0.5) * 2;
        const h = 3 + rng() * 6;
        const darkA = 0.028 + rng() * 0.05;
        ctxA.fillStyle = `rgba(72,78,88,${darkA})`;
        ctxA.fillRect(0, y0, size, h);
        ctxR.fillStyle = `rgba(255,255,255,${darkA * 0.85})`;
        ctxR.fillRect(0, y0, size, h);

        // 交互にわずかな色面（低ポリ参照寄せ）
        if (j % 2 === 0 && rng() > 0.35) {
          const warm = rng() > 0.5;
          const a = 0.04 + rng() * 0.06;
          if (warm) {
            ctxA.fillStyle = `rgba(255,200,170,${a})`;
          } else {
            ctxA.fillStyle = `rgba(170,210,255,${a})`;
          }
          ctxA.fillRect(0, y0 + h * 0.15, size, h * 0.7);
        }
      }

      // 仕上げ縦筋（弱め）
      const stripes = fc.stripeCount;
      for (let i = 0; i < stripes; i++) {
        const x0 = (i / stripes) * size + (rng() - 0.5) * 2;
        const w = 0.8 + rng() * 1.1;
        const alpha = 0.015 + rng() * 0.04;
        ctxA.fillStyle = `rgba(255,255,255,${alpha})`;
        ctxA.fillRect(x0, 0, w, size);
        const ra = 0.015 + rng() * 0.04;
        ctxR.fillStyle = `rgba(255,255,255,${ra})`;
        ctxR.fillRect(x0, 0, w, size);
      }

      const imgA = ctxA.getImageData(0, 0, size, size);
      const imgR = ctxR.getImageData(0, 0, size, size);
      const dataA = imgA.data;
      const dataR = imgR.data;
      const nMin = fc.noiseMulMin;
      const nMax = fc.noiseMulMax;
      for (let i = 0; i < dataA.length; i += 4) {
        const n = rng();
        const mul = nMin + n * (nMax - nMin);
        dataA[i] = Math.min(255, dataA[i] * mul);
        dataA[i + 1] = Math.min(255, dataA[i + 1] * mul);
        dataA[i + 2] = Math.min(255, dataA[i + 2] * mul);
        const rMul = 0.92 + n * 0.12;
        const v = dataR[i] * rMul;
        dataR[i] = Math.max(0, Math.min(255, v));
        dataR[i + 1] = dataR[i];
        dataR[i + 2] = dataR[i];
      }
      ctxA.putImageData(imgA, 0, 0);
      ctxR.putImageData(imgR, 0, 0);

      const albedoMap = new THREE.CanvasTexture(canvasAlbedo);
      albedoMap.wrapS = THREE.RepeatWrapping;
      albedoMap.wrapT = THREE.RepeatWrapping;
      albedoMap.repeat.set(fc.repeatU, fc.repeatV);
      albedoMap.anisotropy = 4;
      albedoMap.needsUpdate = true;

      const roughnessMap = new THREE.CanvasTexture(canvasRough);
      roughnessMap.wrapS = THREE.RepeatWrapping;
      roughnessMap.wrapT = THREE.RepeatWrapping;
      roughnessMap.repeat.set(fc.repeatU, fc.repeatV);
      roughnessMap.anisotropy = 4;
      roughnessMap.needsUpdate = true;

      return { albedoMap, roughnessMap };
    }

    // ---------------------------
    // Main
    // ---------------------------
    const container = document.getElementById("canvas-container");
    if (!container) throw new Error("Missing #canvas-container.");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(CONFIG.bgColor);
    scene.fog = new THREE.Fog(CONFIG.bgColor, CONFIG.fogNear, CONFIG.fogFar);

    const OPENING_FINAL_BG_COLOR = new THREE.Color(CONFIG.bgColor);
    const OPENING_FINAL_FOG_NEAR = CONFIG.fogNear;
    const OPENING_FINAL_FOG_FAR = CONFIG.fogFar;

    // near を少し離して深度バッファ精度を稼ぐ（近接Z-fighting 軽減）
    const camera = new THREE.PerspectiveCamera(45, 1, 2, 4000);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: "high-performance",
      // 街スケールで近接面同士の Z-fighting によるチカチカを抑える
      logarithmicDepthBuffer: true,
      // ステンシル無効で帯域を少し削減（r128 で利用可の場合）
      stencil: false,
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, CONFIG.quality.maxDpr));
    // 最初に確実に見せるため、renderer初期サイズはウィンドウ基準にする
    renderer.setSize(window.innerWidth || 1, window.innerHeight || 1, false);
    camera.aspect = (window.innerWidth || 1) / (window.innerHeight || 1);
    camera.updateProjectionMatrix();

    // 写真的なトーン寄せ（heavyになりすぎない範囲）
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    // ACES はハイライトでギザつきが出る端末があるのでやや抑える
    renderer.toneMappingExposure = 1.04;
    renderer.outputEncoding = THREE.sRGBEncoding;

    const shadowsEnabled = !!CONFIG.quality.enableShadows;
    renderer.shadowMap.enabled = shadowsEnabled;
    if (shadowsEnabled) {
      const sf = CONFIG.quality.shadowFilter || "pcfsoft";
      if (sf === "pcfsoft") {
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      } else if (sf === "pcf") {
        renderer.shadowMap.type = THREE.PCFShadowMap;
      } else {
        renderer.shadowMap.type = THREE.BasicShadowMap;
      }
      // シャドウ更新を間引きして、カメラ移動のフレーム落ちを抑える
      if (renderer.shadowMap && "autoUpdate" in renderer.shadowMap) {
        renderer.shadowMap.autoUpdate = false;
      }
    }

    container.appendChild(renderer.domElement);

    // Lights
    const hemi = new THREE.HemisphereLight(
      CONFIG.lighting.hemiSky,
      CONFIG.lighting.hemiGround,
      CONFIG.lighting.hemiIntensity
    );
    scene.add(hemi);

    const dirLight = new THREE.DirectionalLight(CONFIG.lighting.dirColor, CONFIG.lighting.dirIntensity);
    dirLight.position.set(CONFIG.lighting.dirPos.x, CONFIG.lighting.dirPos.y, CONFIG.lighting.dirPos.z);
    dirLight.castShadow = shadowsEnabled;
    if (shadowsEnabled) {
      const sm = CONFIG.quality.shadowMapSize || 2048;
      dirLight.shadow.mapSize.width = sm;
      dirLight.shadow.mapSize.height = sm;

      const sf = CONFIG.quality.shadowFilter || "pcfsoft";
      // フィルタ別バイアス（PCF系はわずかに強めてアクネとジャギのバランスを取る）
      if (sf === "basic") {
        dirLight.shadow.bias = -0.00012;
        if ("normalBias" in dirLight.shadow) dirLight.shadow.normalBias = 0.014;
      } else if (sf === "pcfsoft") {
        dirLight.shadow.bias = -0.00026;
        if ("normalBias" in dirLight.shadow) dirLight.shadow.normalBias = 0.021;
        if (dirLight.shadow.radius !== undefined) {
          dirLight.shadow.radius =
            CONFIG.quality.shadowRadius != null ? CONFIG.quality.shadowRadius : 1.85;
        }
      } else {
        dirLight.shadow.bias = -0.0002;
        if ("normalBias" in dirLight.shadow) dirLight.shadow.normalBias = 0.018;
      }

      const sc = dirLight.shadow.camera;
      // 全体を覆いつつ広すぎない直交範囲（狭めすぎると斜光で欠け影）
      sc.near = 60;
      sc.far = 4800;
      sc.left = -1900;
      sc.right = 1900;
      sc.top = 2400;
      sc.bottom = -1900;
      sc.updateProjectionMatrix();
    }
    scene.add(dirLight);
    scene.add(dirLight.target);
    dirLight.target.position.set(0, 0, 0);

    // 建物ファサード（横帯・窓なし）
    const { albedoMap, roughnessMap } = createBuildingFacadeMaps(CONFIG.facade.seed);
    // テクスチャ: 斜め視差でのモアレ・キラつき低減（sRGB / 最大異方性フィルタ）
    const maxAniso = renderer.capabilities.getMaxAnisotropy
      ? renderer.capabilities.getMaxAnisotropy()
      : 8;
    albedoMap.anisotropy = maxAniso;
    roughnessMap.anisotropy = maxAniso;
    albedoMap.encoding = THREE.sRGBEncoding;
    roughnessMap.encoding = THREE.LinearEncoding;
    albedoMap.minFilter = THREE.LinearMipmapLinearFilter;
    albedoMap.magFilter = THREE.LinearFilter;
    roughnessMap.minFilter = THREE.LinearMipmapLinearFilter;
    roughnessMap.magFilter = THREE.LinearFilter;

    const buildingMaterial = new THREE.MeshStandardMaterial({
      color: CONFIG.facade.materialBaseColor,
      vertexColors: true,
      side: THREE.FrontSide,
      // flatShading はカメラ移動で面境界がパキッと変わりチカチカしやすいのでオフ
      roughness: CONFIG.building.roughness,
      metalness: CONFIG.building.metalness,
      map: albedoMap,
      roughnessMap,
    });

    function rooftopPropMaterial({ color, roughness, metalness }) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness,
        metalness,
      });
    }

    const propMatHvac = rooftopPropMaterial({
      color: 0x8a9bab,
      roughness: 0.9,
      metalness: 0.05,
    });
    const propMatHelipad = rooftopPropMaterial({
      color: 0x6d6d75,
      roughness: 0.88,
      metalness: 0.04,
    });
    const propMatTank = rooftopPropMaterial({
      color: 0xb8c2d0,
      roughness: 0.85,
      metalness: 0.08,
    });

    // インスタンス以外の Mesh（特殊建物）は頂点色が無いので vertexColors を切る
    const specialBuildingMat = buildingMaterial.clone();
    specialBuildingMat.vertexColors = false;

    // スタンダードに合わせるため、フォッグがあるので距離で「自然に薄れる」前提

    // ブロブ影（軽量影）の準備
    const shadowBlobCfg = CONFIG.shadowBlobs || {};
    const shadowBlobsEnabled = !!shadowBlobCfg.enabled;
    const shadowBlobGeo = new THREE.PlaneGeometry(1, 1);
    const shadowBlobTexture = shadowBlobsEnabled
      ? createShadowBlobTexture(
          shadowBlobCfg.seed != null ? shadowBlobCfg.seed : 1337,
          shadowBlobCfg.textureSize != null ? shadowBlobCfg.textureSize : 128
        )
      : null;
    const shadowBlobMat = shadowBlobsEnabled
      ? new THREE.MeshBasicMaterial({
          map: shadowBlobTexture,
          color: 0x000000,
          transparent: true,
          opacity: shadowBlobCfg.opacity != null ? shadowBlobCfg.opacity : 0.22,
          depthWrite: false,
          depthTest: true,
          side: THREE.DoubleSide,
          fog: true,
          // toneMapped による濃度変動を減らして安定させる
          toneMapped: false,
          blending: THREE.NormalBlending,
        })
      : null;

    // ---------------------------
    // Camera path (30s loop)
    // ---------------------------
    // ループ閉曲線（開始/終了で連続）
    // 低めの高さ・街の前方へ向く視線で「街の中を通る」印象に寄せる
    const pathPoints = [
      new THREE.Vector3(-380, 140, 220),
      new THREE.Vector3(-140, 155, 40),
      new THREE.Vector3(120, 145, -160),
      new THREE.Vector3(280, 120, -40),
      new THREE.Vector3(100, 135, 160),
      new THREE.Vector3(-260, 130, 230),
    ];
    // centripetal: カクつき・ループ点の飛び出しを抑えやすい
    const cameraCurve = new THREE.CatmullRomCurve3(pathPoints, true, "centripetal", 0.5);

    function getCameraPose(u) {
      // closed curve なので、u=0 と u=1 が同じ空間になる前提
      const p = cameraCurve.getPoint(u);
      let tangent;
      if (typeof cameraCurve.getTangent === "function") {
        tangent = cameraCurve.getTangent(u).normalize();
      } else {
        const eps = (CONFIG.camera && CONFIG.camera.tangentEpsilon) || 0.004;
        const p2 = cameraCurve.getPoint((u + eps) % 1);
        tangent = p2.clone().sub(p).normalize();
      }

      // 注視は「進行方向のXZ」に寄せて、地面近くを見るようにする
      // これで、回転が不自然になりにくく、街の中を通る印象が出やすい。
      const tangentXZ = new THREE.Vector3(tangent.x, 0, tangent.z).normalize();
      const lookAhead = 180;
      const target = p.clone().add(tangentXZ.multiplyScalar(lookAhead));

      // 目標Yを固定して、地平線/空への吸い上げを抑える
      target.y = 60;
      return { position: p, target, tangent };
    }

    // ---------------------------
    // City generation (seeded, deterministic)
    // ---------------------------
    class CityChunk {
      constructor(chunkIndex, zOffset) {
        this.chunkIndex = chunkIndex;
        this.group = new THREE.Group();
        this.group.position.z = zOffset;

        // 地面（道路を兼ねる）
        const groundGeo = new THREE.PlaneGeometry(CONFIG.city.chunkWidth, CONFIG.city.chunkDepth);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshStandardMaterial({
          color: CONFIG.city.roadColor,
          roughness: 1.0,
          metalness: 0.0,
          side: THREE.FrontSide,
          depthWrite: true,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.receiveShadow = shadowsEnabled;
        ground.castShadow = false;
        this.group.add(ground);

        // インスタンス用ビルジオメトリ（instanceColor 用に頂点色は白）
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        boxGeo.translate(0, 0.5, 0);
        attachWhiteVertexColors(boxGeo);

        const cols = Math.floor(CONFIG.city.chunkWidth / CONFIG.city.blockSize);
        const rows = Math.floor(CONFIG.city.chunkDepth / CONFIG.city.blockSize);

        const maxCellsPerBlock = 16; // divisions^2（最大div=4なので16）
        const maxTiers = 4 * CONFIG.building.maxTierMultiplier / CONFIG.building.maxTierMultiplier; // 明示的に4上限を保つ
        const maxInstances = cols * rows * maxCellsPerBlock * maxTiers;

        const maxRoof = Math.ceil(maxInstances * CONFIG.rooftop.instanceCapFactor);

        const hvacGeo = new THREE.BoxGeometry(1, 1, 1);
        hvacGeo.translate(0, 0.5, 0);
        const helipadGeo = new THREE.CylinderGeometry(1, 1, 0.14, 12);
        helipadGeo.translate(0, 0.07, 0);
        const tankGeo = new THREE.CylinderGeometry(0.42, 0.46, 1.5, 8);
        tankGeo.translate(0, 0.75, 0);

        this.instanced = new THREE.InstancedMesh(boxGeo, buildingMaterial, maxInstances);
        // 生成後は更新しないのでStaticに寄せる（安定性/性能）
        this.instanced.instanceMatrix.setUsage(THREE.StaticDrawUsage);
        this.instanced.castShadow = shadowsEnabled;
        this.instanced.receiveShadow =
          shadowsEnabled && !!CONFIG.quality.buildingReceiveShadow;
        this.group.add(this.instanced);

        // ブロブ影（軽量化）：本物シャドウの代わり
        this.shadowBlobs = null;
        if (shadowBlobsEnabled && shadowBlobMat) {
          const maxShadowBlobs = Math.ceil(
            maxInstances * (shadowBlobCfg.instanceCapFactor != null ? shadowBlobCfg.instanceCapFactor : 0.25)
          );
          this.shadowBlobs = new THREE.InstancedMesh(
            shadowBlobGeo,
            shadowBlobMat,
            Math.max(1, maxShadowBlobs)
          );
          this.shadowBlobs.instanceMatrix.setUsage(THREE.StaticDrawUsage);
          this.shadowBlobs.castShadow = false;
          this.shadowBlobs.receiveShadow = false;
          // 透明物の優先度調整（道路面と被るため）
          this.shadowBlobs.renderOrder = 2;
          this.group.add(this.shadowBlobs);
        }

        this.roofHvac = new THREE.InstancedMesh(hvacGeo, propMatHvac, maxRoof);
        this.roofHelipad = new THREE.InstancedMesh(helipadGeo, propMatHelipad, maxRoof);
        this.roofTank = new THREE.InstancedMesh(tankGeo, propMatTank, maxRoof);
        [this.roofHvac, this.roofHelipad, this.roofTank].forEach((m) => {
          m.instanceMatrix.setUsage(THREE.StaticDrawUsage);
          // 屋上小物のシャドウは負荷が大きいので落とす（ビル本体は従来どおり）
          m.castShadow = false;
          m.receiveShadow = false;
          this.group.add(m);
        });

        this.specialGroup = new THREE.Group();
        this.group.add(this.specialGroup);

        this.generate();
      }

      generate() {
        // chunkIndex + 固定ワールドシードで決定的
        const worldSeed = 20260319;
        const seed = (worldSeed + this.chunkIndex * 10007) >>> 0;
        const rng = mulberry32(seed);

        const dummy = new THREE.Object3D();
        const color = new THREE.Color();

        let instanceIndex = 0;
        let blobIndex = 0;
        let ih = 0;
        let ihe = 0;
        let it = 0;

        // 余計な再生成を避けるため、ここは初期生成のみ
        this.specialGroup.clear();

        const cols = Math.floor(CONFIG.city.chunkWidth / CONFIG.city.blockSize);
        const rows = Math.floor(CONFIG.city.chunkDepth / CONFIG.city.blockSize);

        const startX = -CONFIG.city.chunkWidth / 2 + CONFIG.city.blockSize / 2;
        const startZ = -CONFIG.city.chunkDepth / 2 + CONFIG.city.blockSize / 2;

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const blockX = startX + c * CONFIG.city.blockSize;
            const blockZ = startZ + r * CONFIG.city.blockSize;

            // 公園/空き地（面の印象を保つため、単純continueはしすぎない）
            if (rng() < 0.08) continue;

            // 特殊建物（少数）
            if (rng() < 0.012) {
              this.createSpecialBuilding(blockX, blockZ, rng);
              continue;
            }

            // 高さ分布（写真っぽさとループ安定の両立）
            const distFromCenter = Math.abs(blockX) / (CONFIG.city.chunkWidth / 2);
            const clusterFactor = Math.sin((blockZ + this.chunkIndex * CONFIG.city.chunkDepth) * 0.003) * 0.5 + 0.5;

            const isHighRiseArea = distFromCenter < 0.35 && clusterFactor > 0.52;
            const isMidRiseArea = distFromCenter < 0.72 && !isHighRiseArea;

            let baseHeight;
            if (isHighRiseArea) baseHeight = 40 + rng() * 85;
            else if (isMidRiseArea) baseHeight = 15 + rng() * 35;
            else baseHeight = 5 + rng() * 18;

            const divisions = isHighRiseArea ? 2 : (isMidRiseArea ? 3 : 4);
            const subSize = (CONFIG.city.blockSize - CONFIG.city.roadWidth) / divisions;
            const offset = (CONFIG.city.blockSize - CONFIG.city.roadWidth) / 2 - subSize / 2;

            for (let sr = 0; sr < divisions; sr++) {
              for (let sc = 0; sc < divisions; sc++) {
                const skipRate = isHighRiseArea ? 0.1 : 0.22;
                if (rng() < skipRate) continue;

                const w = subSize * (0.82 + rng() * 0.18);
                const d = subSize * (0.82 + rng() * 0.18);
                const h = baseHeight * (0.45 + rng() * 1.0);

                const numTiers = (isHighRiseArea && h > 62) ? Math.floor(2 + rng() * 2) : 1;

                let currentY = 0;
                let currentW = w;
                let currentD = d;
                const x = blockX - offset + sc * subSize;
                const z = blockZ - offset + sr * subSize;

                let roofTopY = 0;
                let topW = w;
                let topD = d;

                for (let t = 0; t < numTiers; t++) {
                  const tierH = h / numTiers * (0.75 + rng() * 0.35);
                  topW = currentW;
                  topD = currentD;

                  dummy.position.set(x, currentY, z);
                  dummy.scale.set(currentW, tierH, currentD);
                  dummy.rotation.set(0, 0, 0);
                  dummy.updateMatrix();

                  if (instanceIndex < this.instanced.count) {
                    this.instanced.setMatrixAt(instanceIndex, dummy.matrix);
                    const hue = ((x * 0.0011 + z * 0.0006 + this.chunkIndex * 0.017) + rng() * 0.12) % 1;
                    const sat = 0.1 + rng() * 0.22;
                    const light = 0.72 + rng() * 0.18;
                    color.setHSL(hue, sat, light);
                    this.instanced.setColorAt(instanceIndex, color);

                    // ブロブ影：一つの“ビル”につき最下段(t===0)だけ描画（軽量）
                    if (
                      t === 0 &&
                      this.shadowBlobs &&
                      blobIndex < this.shadowBlobs.count
                    ) {
                      const spawnChance = shadowBlobCfg.spawnChance != null ? shadowBlobCfg.spawnChance : 0.35;
                      // deterministic hash：rngを進めずに出現を決める
                      const h = (instanceIndex * 1664525 + this.chunkIndex * 1013904223) >>> 0;
                      const v = (h % 10000) / 10000;
                      if (v < spawnChance) {
                        const shadowY = shadowBlobCfg.yOffset != null ? shadowBlobCfg.yOffset : 0.012;
                        const blobScale = shadowBlobCfg.blobScale != null ? shadowBlobCfg.blobScale : 1.0;
                        dummy.position.set(x, shadowY, z);
                        dummy.rotation.set(-Math.PI / 2, 0, 0);
                        dummy.scale.set(currentW * blobScale, currentD * blobScale, 1);
                        dummy.updateMatrix();
                        this.shadowBlobs.setMatrixAt(blobIndex++, dummy.matrix);
                      }
                    }

                    instanceIndex++;
                  }

                  roofTopY = currentY + tierH;
                  currentY += tierH;
                  currentW *= (0.64 + rng() * 0.28);
                  currentD *= (0.64 + rng() * 0.28);
                }

                const rt = CONFIG.rooftop;
                // 天面と同一Yは Z-fighting → 物理オフセットのみ（polygonOffset は影と相性が悪い）
                const roofPropY = roofTopY + 0.12;
                if (
                  roofTopY >= rt.minBuildingHeight &&
                  rng() < rt.spawnChance &&
                  topW > 4 &&
                  topD > 4
                ) {
                  const wSum = rt.hvacWeight + rt.helipadWeight + rt.tankWeight;
                  const roll = rng() * wSum;
                  let type = 2;
                  if (roll < rt.hvacWeight) type = 0;
                  else if (roll < rt.hvacWeight + rt.helipadWeight) type = 1;

                  if (type === 0) {
                    if (ih < this.roofHvac.count) {
                      const bw = clamp(topW * 0.52, 2.5, 10);
                      const bh = clamp(topD * 0.22, 1.1, 5.5);
                      const bd = clamp(topD * 0.48, 2, 9);
                      dummy.position.set(x, roofPropY, z);
                      dummy.scale.set(bw, bh, bd);
                      dummy.rotation.set(0, rng() * Math.PI * 2, 0);
                      dummy.updateMatrix();
                      this.roofHvac.setMatrixAt(ih++, dummy.matrix);
                    }
                  } else if (type === 1) {
                    if (ihe < this.roofHelipad.count) {
                      const rad = clamp(Math.min(topW, topD) * 0.36, 2.2, 13);
                      dummy.position.set(x, roofPropY, z);
                      dummy.scale.set(rad, 1, rad);
                      dummy.rotation.set(0, 0, 0);
                      dummy.updateMatrix();
                      this.roofHelipad.setMatrixAt(ihe++, dummy.matrix);
                    }
                  } else if (it < this.roofTank.count) {
                    const ox = (rng() - 0.5) * topW * 0.32;
                    const oz = (rng() - 0.5) * topD * 0.32;
                    const scl = clamp(Math.min(topW, topD) * 0.2, 1.1, 5);
                    dummy.position.set(x + ox, roofPropY, z + oz);
                    dummy.scale.set(scl, scl, scl);
                    dummy.rotation.set(0, rng() * Math.PI * 2, 0);
                    dummy.updateMatrix();
                    this.roofTank.setMatrixAt(it++, dummy.matrix);
                  }
                }
              }
            }
          }
        }

        // 余りを見えないように埋める（ループでも安定）
        for (; instanceIndex < this.instanced.count; instanceIndex++) {
          dummy.position.set(0, -1000, 0);
          dummy.scale.set(0, 0, 0);
          dummy.updateMatrix();
          this.instanced.setMatrixAt(instanceIndex, dummy.matrix);
        }

        // ブロブ影の余りも非表示化
        if (this.shadowBlobs) {
          for (; blobIndex < this.shadowBlobs.count; blobIndex++) {
            dummy.position.set(0, -1000, 0);
            dummy.rotation.set(0, 0, 0);
            dummy.scale.set(0, 0, 0);
            dummy.updateMatrix();
            this.shadowBlobs.setMatrixAt(blobIndex, dummy.matrix);
          }
        }

        for (; ih < this.roofHvac.count; ih++) {
          dummy.position.set(0, -2000, 0);
          dummy.scale.set(0, 0, 0);
          dummy.rotation.set(0, 0, 0);
          dummy.updateMatrix();
          this.roofHvac.setMatrixAt(ih, dummy.matrix);
        }
        for (; ihe < this.roofHelipad.count; ihe++) {
          dummy.position.set(0, -2000, 0);
          dummy.scale.set(0, 0, 0);
          dummy.rotation.set(0, 0, 0);
          dummy.updateMatrix();
          this.roofHelipad.setMatrixAt(ihe, dummy.matrix);
        }
        for (; it < this.roofTank.count; it++) {
          dummy.position.set(0, -2000, 0);
          dummy.scale.set(0, 0, 0);
          dummy.rotation.set(0, 0, 0);
          dummy.updateMatrix();
          this.roofTank.setMatrixAt(it, dummy.matrix);
        }

        this.instanced.instanceMatrix.needsUpdate = true;
        if (this.instanced.instanceColor) this.instanced.instanceColor.needsUpdate = true;
        this.roofHvac.instanceMatrix.needsUpdate = true;
        this.roofHelipad.instanceMatrix.needsUpdate = true;
        this.roofTank.instanceMatrix.needsUpdate = true;
        if (this.shadowBlobs) this.shadowBlobs.instanceMatrix.needsUpdate = true;
      }

      createSpecialBuilding(x, z, rng) {
        const type = Math.floor(rng() * 2);

        if (type === 0) {
          // Stadium風
          const radius = (CONFIG.city.blockSize - CONFIG.city.roadWidth) * 0.40;
          const mat = specialBuildingMat;

          const geo = new THREE.TorusGeometry(radius, radius * 0.3, 16, 32);
          const mesh = new THREE.Mesh(geo, mat);
          mesh.rotation.x = -Math.PI / 2;
          mesh.position.set(x, radius * 0.5, z);
          mesh.castShadow = shadowsEnabled;
          mesh.receiveShadow = shadowsEnabled && !!CONFIG.quality.buildingReceiveShadow;
          this.specialGroup.add(mesh);

          const baseGeo = new THREE.CylinderGeometry(radius * 1.2, radius * 1.2, radius * 0.5, 32);
          const base = new THREE.Mesh(baseGeo, mat);
          base.position.set(x, radius * 0.25, z);
          base.castShadow = shadowsEnabled;
          base.receiveShadow = shadowsEnabled && !!CONFIG.quality.buildingReceiveShadow;
          this.specialGroup.add(base);
        } else {
          // Tower風
          const radius = (CONFIG.city.blockSize - CONFIG.city.roadWidth) * 0.3;
          const height = 85 + rng() * 65;
          const mat = specialBuildingMat;

          const geo = new THREE.CylinderGeometry(radius * 0.3, radius, height, 16);
          geo.translate(0, height / 2, 0);
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(x, 0, z);
          mesh.castShadow = shadowsEnabled;
          mesh.receiveShadow = shadowsEnabled && !!CONFIG.quality.buildingReceiveShadow;
          this.specialGroup.add(mesh);
        }
      }
    }

    const chunks = [];
    const worldPeriodZ = CONFIG.city.chunkDepth * CONFIG.city.numChunks;
    const baseZ0 = -CONFIG.city.chunkDepth * Math.floor(CONFIG.city.numChunks / 2);

    // 初期配置（コンテンツは固定、位置だけperiod的にずらす）
    for (let i = 0; i < CONFIG.city.numChunks; i++) {
      const z = i * CONFIG.city.chunkDepth + baseZ0;
      const chunk = new CityChunk(i, z);
      chunks.push(chunk);
      scene.add(chunk.group);
    }

    // ---------------------------
    // Resize / responsive
    // ---------------------------
    function resizeToContainer() {
      const rect = container.getBoundingClientRect();
      let w = rect.width;
      let h = rect.height;
      // 埋め込み直後やhidden/transition中に0になるケースがあるためフォールバック
      if (!w || !h || w < 2 || h < 2) {
        w = window.innerWidth;
        h = window.innerHeight;
      }
      w = Math.max(1, Math.floor(w));
      h = Math.max(1, Math.floor(h));
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, CONFIG.quality.maxDpr));
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    // リサイズ連打で setSize が多発するとちらつきの原因になるので 1 フレにまとめる
    let resizeRaf = 0;
    function scheduleResize() {
      if (resizeRaf) return;
      resizeRaf = requestAnimationFrame(() => {
        resizeRaf = 0;
        resizeToContainer();
      });
    }

    // ResizeObserverで埋め込み枠変更にも追従（無ければresizeで代替）
    if ("ResizeObserver" in window) {
      const ro = new ResizeObserver(() => scheduleResize());
      ro.observe(container);
      resizeToContainer();
    } else {
      resizeToContainer();
      window.addEventListener("resize", scheduleResize, { passive: true });
    }

    // ---------------------------
    // Reduced motion
    // ---------------------------
    let reducedMotion = false;
    const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    function syncReducedMotion() {
      reducedMotion = !!mq.matches;
    }
    syncReducedMotion();
    if (mq.addEventListener) mq.addEventListener("change", syncReducedMotion);
    else mq.addListener(syncReducedMotion);

    // Tab hidden時は更新抑制（安定性/バッテリー）
    let isVisible = true;
    document.addEventListener("visibilitychange", () => {
      isVisible = !document.hidden;
    });

    // ---------------------------
    // Landing opening (タイプライト → 霧解除 → 本編タイムライン開始)
    // ---------------------------
    const openingCfg = CONFIG.opening || {};
    const openingEnabled = !!openingCfg.enabled;
    const openingOverlayEl = document.getElementById("opening-overlay");
    const openingTypeTextEl = document.getElementById("opening-typewriter-text");
    const openingSkipHintEl = document.getElementById("opening-skip-hint");
    const overlayCityscapeEl = document.querySelector(".overlay-cityscape");

    const OPENING_START_FOG_NEAR_CFG =
      openingCfg.openingFogNear != null ? openingCfg.openingFogNear : 42;
    const OPENING_START_FOG_FAR_CFG =
      openingCfg.openingFogFar != null ? openingCfg.openingFogFar : 320;

    let openingPhase = "done";
    let mainTimelineStart = null;
    let revealStartedAt = 0;
    let typewriterTimer = null;
    let cursorBlinkTimer = null;
    let mainTimelineDelayTimer = null;
    let openingCompleteFlag = false;
    let shadowsPausedForOpening = false;
    const openingCursorEl = document.querySelector(
      "#opening-overlay .opening-cursor"
    );

    function easeOutCubicOpening(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function applySceneVisualFinalOpening() {
      scene.background.copy(OPENING_FINAL_BG_COLOR);
      scene.fog.color.copy(OPENING_FINAL_BG_COLOR);
      scene.fog.near = OPENING_FINAL_FOG_NEAR;
      scene.fog.far = OPENING_FINAL_FOG_FAR;
    }

    function applySceneVisualOpeningStart() {
      scene.background.setHex(0xffffff);
      scene.fog.color.setHex(0xffffff);
      scene.fog.near = OPENING_START_FOG_NEAR_CFG;
      scene.fog.far = OPENING_START_FOG_FAR_CFG;
    }

    function finishOpeningSequence() {
      if (openingCompleteFlag) return;
      openingCompleteFlag = true;
      openingPhase = "done";
      if (typewriterTimer) {
        clearTimeout(typewriterTimer);
        typewriterTimer = null;
      }
      if (cursorBlinkTimer) {
        clearTimeout(cursorBlinkTimer);
        cursorBlinkTimer = null;
      }
      if (mainTimelineDelayTimer) {
        clearTimeout(mainTimelineDelayTimer);
        mainTimelineDelayTimer = null;
      }
      if (openingCursorEl) openingCursorEl.classList.remove("opening-cursor--blinking");
      applySceneVisualFinalOpening();
      if (openingOverlayEl) {
        openingOverlayEl.style.opacity = "0";
        openingOverlayEl.setAttribute("aria-hidden", "true");
        openingOverlayEl.setAttribute("aria-modal", "false");
        setTimeout(() => {
          openingOverlayEl.style.display = "none";
        }, 480);
      }
      if (overlayCityscapeEl) overlayCityscapeEl.classList.remove("overlay-cityscape--hidden");
      // mainTimelineStart は「開始遅延」で既にセットされている場合があるため、
      // 巻き戻り防止として null のときだけ開始する。
      if (mainTimelineStart === null) {
        mainTimelineStart = performance.now();
      }
    }

    function beginRevealPhase() {
      openingPhase = "reveal";
      revealStartedAt = performance.now();
    }

    function scheduleTypewriter() {
      const text = openingCfg.typewriterText || "ArcAid...";
      const charDelay = openingCfg.charDelayMs != null ? openingCfg.charDelayMs : 100;
      const gapBeforeText =
        openingCfg.typewriterPhraseGapBeforeText != null
          ? openingCfg.typewriterPhraseGapBeforeText
          : null;
      const gapDelayMs =
        openingCfg.typewriterPhraseGapDelayMs != null
          ? openingCfg.typewriterPhraseGapDelayMs
          : 220;
      const pauseAfter = openingCfg.pauseAfterTypeMs != null ? openingCfg.pauseAfterTypeMs : 600;
      let i = 0;
      // i は「すでにタイプ済み文字数」(次に追加する文字の 0-based index) を表す
      const gapBeforeIdx =
        gapBeforeText ? text.indexOf(gapBeforeText) : -1;
      let didGapPause = false;
      function tick() {
        if (openingPhase !== "typing") return;
        if (i < text.length) {
          i++;
          if (openingTypeTextEl) openingTypeTextEl.textContent = text.slice(0, i);
          let nextDelay = charDelay;
          // 「空間の」開始直前にのみ追加ディレイ
          if (!didGapPause && gapBeforeIdx >= 0 && i === gapBeforeIdx) {
            nextDelay = gapDelayMs;
            didGapPause = true;
          }
          typewriterTimer = setTimeout(tick, nextDelay);
        } else {
          openingPhase = "pause";
          typewriterTimer = setTimeout(() => {
            if (openingCompleteFlag) return;
            beginRevealPhase();
          }, pauseAfter);
        }
      }
      openingPhase = "typing";
      if (openingCursorEl) {
        openingCursorEl.classList.add("opening-cursor--blinking");
        openingCursorEl.style.opacity = "1";
      }
      // 最初のDOM更新（textContent）は描画と同フレームでぶつかると
      // 立ち上がりだけカクつくことがあるので、次の rAF にずらす
      requestAnimationFrame(() => {
        if (openingPhase === "typing") tick();
      });
    }

    if (!openingEnabled || reducedMotion) {
      if (openingOverlayEl) openingOverlayEl.style.display = "none";
      openingCompleteFlag = true;
      mainTimelineStart = performance.now();
      openingPhase = "done";
    } else {
      applySceneVisualOpeningStart();
      if (overlayCityscapeEl) overlayCityscapeEl.classList.add("overlay-cityscape--hidden");
      if (openingSkipHintEl && openingCfg.showSkipHint === false) {
        openingSkipHintEl.style.display = "none";
      }
      openingCompleteFlag = false;
      // 4回キャレット点滅が終わってから本編ループを開始（ビルの動き出しを少し遅らせる）
      mainTimelineStart = null;
      openingPhase = "cursor";
      if (openingTypeTextEl) openingTypeTextEl.textContent = "";
      if (openingCursorEl) {
        openingCursorEl.classList.remove("opening-cursor--blinking");
        openingCursorEl.style.opacity = "1";
      }

      // キャレットを「4回」だけ点滅させてから ArcAid を出す
      const blinkCount =
        openingCfg.preTypeCursorBlinkCount != null
          ? openingCfg.preTypeCursorBlinkCount
          : 4;
      const blinkMs =
        openingCfg.cursorBlinkCycleMs != null
          ? openingCfg.cursorBlinkCycleMs
          : 900;
      const halfMs = Math.max(50, Math.floor(blinkMs / 2));

      // 1回 = 「表示(ON)→非表示(OFF)」としてカウント
      let remaining = blinkCount;
      function blinkOnce() {
        if (openingCompleteFlag) return;
        if (openingCursorEl) openingCursorEl.style.opacity = "1";
        cursorBlinkTimer = setTimeout(() => {
          if (openingCompleteFlag) return;
          if (openingCursorEl) openingCursorEl.style.opacity = "0";
          remaining--;
          if (remaining <= 0) {
            typewriterTimer = setTimeout(() => {
              if (openingCompleteFlag) return;
              scheduleTypewriter();
            }, 0);
            // ArcAid表示開始後に、さらに遅らせて本編（ビル/カメラ）を起動
            const extraDelayMs =
              openingCfg.mainTimelineStartDelayMs != null
                ? openingCfg.mainTimelineStartDelayMs
                : 600;
            mainTimelineDelayTimer = setTimeout(() => {
              if (openingCompleteFlag) return;
              mainTimelineStart = performance.now();
            }, extraDelayMs);
          } else {
            cursorBlinkTimer = setTimeout(blinkOnce, halfMs);
          }
        }, halfMs);
      }
      // 最初は ON から開始
      blinkOnce();
    }

    if (openingCfg.allowSkip !== false) {
      function onSkipOpening() {
        if (!openingEnabled || openingCompleteFlag) return;
        finishOpeningSequence();
      }
      if (openingOverlayEl) openingOverlayEl.addEventListener("click", onSkipOpening);
      window.addEventListener(
        "keydown",
        (e) => {
          if (e.key !== "Enter" && e.key !== " ") return;
          if (!openingEnabled || openingCompleteFlag) return;
          e.preventDefault();
          onSkipOpening();
        },
        { passive: false }
      );
    }

    // ---------------------------
    // Mouse tracking (軽い追従)
    // ---------------------------
    let pointerX = 0;
    let pointerY = 0;
    let pointerXTarget = 0;
    let pointerYTarget = 0;

    function onPointerMove(e) {
      // 追従が無効なら更新しない（カメラ破綻の原因排除）
      if (!CONFIG.mouseParallax.enabled) return;
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      pointerXTarget = (x * 2 - 1);  // -1..1
      pointerYTarget = -(y * 2 - 1); // -1..1
    }

    // 追従が有効な時だけイベントを張る
    if (CONFIG.mouseParallax.enabled) {
      window.addEventListener("pointermove", onPointerMove, { passive: true });
    }

    // ---------------------------
    // Animation loop
    // ---------------------------
    let lastRenderNow = performance.now();
    let uSmoothed = null;
    let uVel = 0;
    let hadMainTimeline = false;
    let shadowUpdateCounter = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      if (!isVisible) return;

      // オープニング中だけ影レンダリングを止めて、GPU負荷によるカクつきを抑える
      if (shadowsEnabled && openingEnabled) {
        const shouldPause = openingPhase !== "done";
        if (shouldPause && !shadowsPausedForOpening) {
          renderer.shadowMap.enabled = false;
          dirLight.castShadow = false;
          shadowsPausedForOpening = true;
        } else if (!shouldPause && shadowsPausedForOpening) {
          renderer.shadowMap.enabled = true;
          dirLight.castShadow = true;
          shadowsPausedForOpening = false;
        }
      }

      const dtSec = Math.min(0.05, Math.max(0.001, (now - lastRenderNow) / 1000));
      lastRenderNow = now;

      if (openingPhase === "reveal" && !openingCompleteFlag) {
        const dur =
          openingCfg.revealDurationMs != null ? openingCfg.revealDurationMs : 3200;
        const p = Math.min(1, (now - revealStartedAt) / dur);
        const e = easeOutCubicOpening(p);
        scene.background.setHex(0xffffff).lerp(OPENING_FINAL_BG_COLOR, e);
        scene.fog.color.copy(scene.background);
        scene.fog.near = THREE.MathUtils.lerp(
          OPENING_START_FOG_NEAR_CFG,
          OPENING_FINAL_FOG_NEAR,
          e
        );
        scene.fog.far = THREE.MathUtils.lerp(
          OPENING_START_FOG_FAR_CFG,
          OPENING_FINAL_FOG_FAR,
          e
        );
        if (openingOverlayEl) openingOverlayEl.style.opacity = String(1 - e);
        if (p >= 1) finishOpeningSequence();
      }

      // mainTimelineStart が「null から初めて確定」したフレームだけ、
      // uTarget を直前の uSmoothed に寄せて誤差をゼロにする（最初のかくつき対策）
      const mainTimelineIsActive = mainTimelineStart !== null;
      const mainTimelineJustActivated = mainTimelineIsActive && !hadMainTimeline;
      hadMainTimeline = mainTimelineIsActive;

      const t =
        mainTimelineStart === null ? 0 : (now - mainTimelineStart) / CONFIG.loopDurationMs;
      let uTarget = t - Math.floor(t);
      if (mainTimelineJustActivated) {
        if (uSmoothed !== null) uTarget = uSmoothed;
        uVel = 0;
      }

      const camCfg = CONFIG.camera || {};
      const kStiff =
        typeof camCfg.pathSpringStiffness === "number" ? camCfg.pathSpringStiffness : 0;

      let u = uTarget;
      if (reducedMotion) {
        uSmoothed = uTarget;
        uVel = 0;
        u = uTarget;
      } else if (kStiff > 0) {
        if (uSmoothed === null) {
          uSmoothed = uTarget;
          uVel = 0;
        }
        let err = uTarget - uSmoothed;
        if (err > 0.5) err -= 1;
        if (err < -0.5) err += 1;
        const damp =
          typeof camCfg.pathSpringDamping === "number" ? camCfg.pathSpringDamping : 15;
        uVel += (err * kStiff - uVel * damp) * dtSec;
        uSmoothed += uVel * dtSec;
        while (uSmoothed >= 1) uSmoothed -= 1;
        while (uSmoothed < 0) uSmoothed += 1;
        u = uSmoothed;
      } else {
        let smoothK =
          typeof camCfg.loopParamSmoothing === "number" ? camCfg.loopParamSmoothing : 0;
        if (smoothK > 0) {
          if (uSmoothed === null) uSmoothed = uTarget;
          let diff = uTarget - uSmoothed;
          if (diff > 0.5) diff -= 1;
          if (diff < -0.5) diff += 1;
          const alpha = 1 - Math.exp(-smoothK * dtSec);
          uSmoothed += diff * alpha;
          if (uSmoothed >= 1) uSmoothed -= 1;
          if (uSmoothed < 0) uSmoothed += 1;
          u = uSmoothed;
        } else {
          uSmoothed = uTarget;
          uVel = 0;
        }
      }

      // カメラ pose（ループ連続）
      const pose = getCameraPose(u);

      // マウス追従が無効なら常にオフ（ループのみ）
      const mouseScale = (CONFIG.mouseParallax.enabled && !reducedMotion) ? 1.0 : 0.0;

      // 軽いマウスオフセット
      pointerX += (pointerXTarget - pointerX) * CONFIG.mouseParallax.smoothing;
      pointerY += (pointerYTarget - pointerY) * CONFIG.mouseParallax.smoothing;

      const px = pointerX * CONFIG.mouseParallax.positionStrength.x * mouseScale;
      const py = pointerY * CONFIG.mouseParallax.positionStrength.y * mouseScale;

      camera.position.copy(pose.position);
      camera.position.x += px;
      camera.position.y += py;

      // lookAtも少しだけズラす（回転の破綻を避ける）— 毎フレーム lookAt で画角を以前と一致
      const look = pose.target.clone();
      look.x += pointerX * CONFIG.mouseParallax.lookStrength * 220 * mouseScale;
      look.y += pointerY * CONFIG.mouseParallax.lookStrength * 120 * mouseScale;
      camera.lookAt(look);

      // City treadmill（周期をカメラループに合わせる）
      // "modでラップ"することで、ループ境界で街配置が完全に一致するようにする。
      const cityShiftZ = u * worldPeriodZ; // 0..worldPeriodZ
      for (let i = 0; i < chunks.length; i++) {
        const local = i * CONFIG.city.chunkDepth + cityShiftZ;
        const wrapped = ((local % worldPeriodZ) + worldPeriodZ) % worldPeriodZ;
        chunks[i].group.position.z = baseZ0 + wrapped;
      }

      // 描画
      // シャドウは毎フレーム更新せず間引く（ビル影のコストを下げる）
      if (shadowsEnabled && openingEnabled && openingPhase === "done" && renderer.shadowMap) {
        shadowUpdateCounter++;
        const every = CONFIG.quality.shadowUpdateEveryFrames || 3;
        if (shadowUpdateCounter % every === 0) {
          if ("needsUpdate" in renderer.shadowMap) {
            renderer.shadowMap.needsUpdate = true;
          }
        }
      }
      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
